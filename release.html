<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jira — Релиз</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      min-height: 100vh;
    }

    /* Demo banner */
    .demo-notice {
      background: #fffae6;
      border-bottom: 2px solid #f6c000;
      padding: 7px 20px;
      font-size: 12px;
      color: #7a5c00;
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* Top nav */
    .topnav {
      background: #0052cc;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .jira-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-decoration: none;
    }

    .jira-icon {
      width: 28px; height: 28px;
      background: #4c9aff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: #0052cc;
    }

    .topnav-sep {
      width: 1px; height: 22px;
      background: rgba(255,255,255,0.25);
    }

    .topnav-project {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      font-weight: 500;
    }

    /* Layout */
    .layout {
      display: flex;
      min-height: calc(100vh - 90px);
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #dfe1e6;
      padding: 16px 0;
      flex-shrink: 0;
    }

    .sidebar-section { margin-bottom: 4px; }

    .sidebar-section-label {
      font-size: 11px;
      font-weight: 700;
      color: #6b778c;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 10px 20px 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      font-size: 14px;
      color: #42526e;
      cursor: pointer;
      transition: background 0.1s;
    }

    .sidebar-item:hover { background: #f4f5f7; }
    .sidebar-item.active { background: #e9f0ff; color: #0052cc; font-weight: 600; border-left: 3px solid #0052cc; padding-left: 17px; }

    .sidebar-icon { font-size: 15px; opacity: 0.7; }

    /* Main */
    .main {
      flex: 1;
      padding: 28px 36px;
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6b778c;
      margin-bottom: 20px;
    }

    .breadcrumb a {
      color: #0052cc;
      text-decoration: none;
    }
    .breadcrumb a:hover { text-decoration: underline; }
    .bc-sep { color: #97a0af; font-size: 10px; }

    /* Release header */
    .release-header { margin-bottom: 28px; }

    .release-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .release-id {
      font-size: 22px;
      font-weight: 700;
      color: #172b4d;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .release-title {
      font-size: 18px;
      color: #42526e;
      font-weight: 400;
    }

    .release-status {
      background: #e3fcef;
      color: #006644;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex-shrink: 0;
    }

    .release-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      font-size: 13px;
      color: #6b778c;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #dfe1e6;
      border-radius: 4px;
    }

    .meta-item { display: flex; align-items: center; gap: 6px; }
    .meta-label { font-weight: 600; color: #42526e; }

    .project-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Issues */
    .issues-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      margin-top: 28px;
    }

    .issues-title {
      font-size: 12px;
      font-weight: 700;
      color: #6b778c;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .issues-count {
      font-size: 12px;
      color: #97a0af;
    }

    /* Issue row */
    .issue-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      background: #fff;
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      margin-bottom: 3px;
      cursor: default;
      transition: background 0.1s, box-shadow 0.1s;
    }

    .issue-row:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .issue-type-icon {
      width: 16px; height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 900;
      color: #fff;
    }

    .issue-key {
      font-size: 12px;
      font-weight: 600;
      color: #0052cc;
      white-space: nowrap;
      min-width: 90px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .issue-summary {
      font-size: 14px;
      color: #172b4d;
      flex: 1;
      min-width: 0;
    }

    .issue-team {
      font-size: 11px;
      color: #6b778c;
      white-space: nowrap;
      background: #f4f5f7;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #dfe1e6;
    }

    .issue-status {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 3px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 64px;
      text-align: center;
    }

    .status-done     { background: #e3fcef; color: #006644; }
    .status-bug      { background: #ffebe6; color: #bf2600; }
    .status-perf     { background: #e6f4ff; color: #0052cc; }
    .status-security { background: #fff8e6; color: #7a5c00; }
    .status-chore    { background: #f4f5f7; color: #42526e; }

    /* Not found */
    .not-found {
      text-align: center;
      padding: 80px 24px;
    }
    .not-found h2 { font-size: 20px; margin-bottom: 8px; color: #172b4d; }
    .not-found p { color: #6b778c; font-size: 14px; }
    .back-link { display: inline-block; margin-top: 16px; color: #0052cc; font-size: 13px; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { padding: 16px; }
      .issue-team { display: none; }
    }

    function formatReleaseId(date) {
      const [y, m, d] = date.split('-');
      return `R.${y.slice(2)}.${m}.${d}`;
    }

    const params  = new URLSearchParams(location.search);
    const project = params.get('project');
    const version = params.get('version');
    const release = releases.find(r => r.project === project && r.version === version);

    const main = document.getElementById('main');

    if (!release) {
      main.innerHTML = `
        <div class="not-found">
          <h2>Релиз не найден</h2>
          <p>Возможно, ссылка устарела или содержит ошибку.</p>
          <a class="back-link" href="index.html">← Вернуться к Release Notes</a>
        </div>`;
    } else {
      const releaseId   = formatReleaseId(release.date);
      const projColor   = projectConfig[release.project] || '#2563eb';
      const stack       = projectStack[release.project] || '';

      document.title = `Jira — ${releaseId} · ${release.project}`;
      document.getElementById('topnav-project').textContent = release.project;

      const issueRows = release.tasks.map(t => {
        const tc = typeConfig[t.type] || typeConfig.chore;
        return `
          <div class="issue-row">
            <span class="issue-type-icon" style="background:${tc.bg}" title="${tc.title}">${tc.label}</span>
            <span class="issue-key">${t.id}</span>
            <span class="issue-summary">${t.text}</span>
            <span class="issue-team">${t.team}</span>
            <span class="issue-status ${tc.statusClass}">${tc.statusLabel}</span>
          </div>`;
      }).join('');

      main.innerHTML = `
        <div class="breadcrumb">
          <a href="index.html">Release Notes</a>
          <span class="bc-sep">›</span>
          <span>${release.project}</span>
          <span class="bc-sep">›</span>
          <span>Релизы</span>
          <span class="bc-sep">›</span>
          <span>${releaseId}</span>
        </div>

        <div class="release-header">
          <div class="release-title-row">
            <span class="release-id">${releaseId}</span>
            <span class="release-title">— ${release.title}</span>
            <span class="release-status">Выпущен</span>
          </div>
          <div class="release-meta">
            <div class="meta-item">
              <span class="meta-label">Продукт:</span>
              <span class="project-dot" style="background:${projColor}"></span>
              ${release.project}
            </div>
            <div class="meta-item">
              <span class="meta-label">Стек:</span>
              ${stack}
            </div>
            <div class="meta-item">
              <span class="meta-label">Дата:</span>
              ${release.date}
            </div>
            ${release.owner ? `<div class="meta-item"><span class="meta-label">Ответственный:</span>${release.owner}</div>` : ''}
            <div class="meta-item">
              <span class="meta-label">Задач:</span>
              ${release.tasks.length}
            </div>
          </div>
        </div>

        <div class="issues-header">
          <span class="issues-title">Задачи релиза</span>
          <span class="issues-count">${release.tasks.length} задач</span>
        </div>
        ${issueRows}
      `;
    }
