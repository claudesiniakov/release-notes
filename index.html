        </div>
      </div>

      <div class="sidebar-card">
        <h3>По стеку</h3>
        <div id="agg-stacks"></div>
      </div>

      <div class="sidebar-card">
        <h3>По проекту</h3>
        <div id="agg-projects"></div>
      </div>

      <div class="sidebar-card">
        <h3>По типу</h3>
        <div id="agg-types"></div>
      </div>

      <div class="sidebar-card">
        <h3>По команде</h3>
        <div id="agg-teams"></div>
      </div>

      <div class="sidebar-card">
        <h3>По релизу</h3>
        <div id="agg-releases"></div>
      </div>

    </aside>

    <!-- Content -->
    <div class="content">

      <div class="toolbar">
        <input type="text" id="search" placeholder="Поиск по задачам, ID..." autocomplete="off">
        <div class="filters">
          <select id="filter-stack">
            <option value="">Все стеки</option>
          </select>
          <select id="filter-project">
            <option value="">Все проекты</option>
          </select>
          <select id="filter-release">
            <option value="">Все релизы</option>
          </select>
          <select id="filter-team">
            <option value="">Все команды</option>
          </select>
          <select id="filter-type">
            <option value="">Все типы</option>
          </select>
          <button id="reset-filters">Сбросить</button>
        </div>
        <div class="stats-bar">Показано: <span id="stats-count">0</span> задач</div>
      </div>

      <div id="releases-container"></div>
      <div class="empty-state" id="empty-state" style="display:none">Ничего не найдено</div>

    </div>
  </div>

    const typeConfig = {
      feat:     { color: "#16a34a", bg: "#f0fdf4", label: "feat" },

      perf:     { color: "#2563eb", bg: "#eff6ff", label: "perf" },

      Frontend: "#7c3aed",

    };

    const projectConfig = {
      "booking":       "#0f766e",
      "ai_gateway":    "#7c3aed",
      "json-formatter":"#b45309",
      "release-notes": "#2563eb",
    };

    // Populate selects
    const allStacks   = [...new Set(Object.values(projectStack))].sort();
    const allProjects = [...new Set(releases.map(r => r.project))].sort();
    const allTeams    = [...new Set(releases.flatMap(r => r.tasks.map(t => t.team)))].sort();
    const allTypes    = [...new Set(releases.flatMap(r => r.tasks.map(t => t.type)))].sort();

    allStacks.forEach(s => {
      document.getElementById("filter-stack").insertAdjacentHTML("beforeend", `<option value="${s}">${s}</option>`);
    });
    allProjects.forEach(p => {
      document.getElementById("filter-project").insertAdjacentHTML("beforeend", `<option value="${p}">${p}</option>`);
    });
    allTeams.forEach(t => {
      document.getElementById("filter-team").insertAdjacentHTML("beforeend", `<option value="${t}">${t}</option>`);
    });
    allTypes.forEach(t => {
      document.getElementById("filter-type").insertAdjacentHTML("beforeend", `<option value="${t}">${t}</option>`);
    });

    // Update project select based on stack filter
    function updateProjectSelect(stackFilter) {
      const sel = document.getElementById("filter-project");
      const current = sel.value;
      sel.innerHTML = '<option value="">Все проекты</option>';
      allProjects
        .filter(p => !stackFilter || projectStack[p] === stackFilter)
        .forEach(p => {
          sel.insertAdjacentHTML("beforeend", `<option value="${p}">${p}</option>`);
        });
      if ([...sel.options].some(o => o.value === current)) sel.value = current;
      else sel.value = "";
    }

    // Update release select based on active project/stack filter
    function updateReleaseSelect(projectFilter, stackFilter) {
      const sel = document.getElementById("filter-release");
      const current = sel.value;
      sel.innerHTML = '<option value="">Все релизы</option>';
      releases
        .filter(r => (!projectFilter || r.project === projectFilter) && (!stackFilter || projectStack[r.project] === stackFilter))
        .forEach(r => {
          sel.insertAdjacentHTML("beforeend", `<option value="${r.version}|${r.project}">${r.project} ${r.version}</option>`);
        });
      if ([...sel.options].some(o => o.value === current)) sel.value = current;
      else sel.value = "";
    }

    function renderAgg(containerId, keyFn, colorFn, filterId, allTasks) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      const counts = {};
      allTasks.forEach(t => {
        const key = keyFn(t);
        counts[key] = (counts[key] || 0) + 1;
      });
      const max = Math.max(...Object.values(counts), 1);
      Object.entries(counts).sort((a, b) => b[1] - a[1]).forEach(([key, count]) => {
        const color = colorFn(key);
        const barWidth = Math.round((count / max) * 56);
        const sel = document.getElementById(filterId);
        const isActive = sel && sel.value === key;
        const row = document.createElement("div");
        row.className = "agg-row" + (isActive ? " active" : "");
        row.innerHTML = `
          <span class="agg-label">
            <span class="agg-dot" style="background:${color}"></span>
            ${key}
          </span>
          <span class="agg-bar-wrap">
            <span class="agg-bar" style="width:${barWidth}px;background:${color}20;border:1px solid ${color}40"></span>
            <span class="agg-num">${count}</span>
          </span>
        `;
        if (filterId) {
          row.addEventListener("click", () => {
            const s = document.getElementById(filterId);
            s.value = s.value === key ? "" : key;
            if (filterId === "filter-project") updateReleaseSelect(s.value);
            applyFilters();
          });
        }
        container.appendChild(row);
      });
    }

    function renderSidebar(filtered) {
      const allTasks = filtered.flatMap(r => r.tasks);
      const total = allTasks.length;

      document.getElementById("total-count").textContent = total;
      document.getElementById("total-releases").textContent = filtered.filter(r => r.tasks.length > 0).length;

      renderAgg("agg-stacks",   t => projectStack[t._project] || "—", k => stackConfig[k] || "#6b7280", "filter-stack", allTasks);
      renderAgg("agg-projects", t => t._project, k => projectConfig[k] || "#6b7280", "filter-project", allTasks);
      renderAgg("agg-types",    t => t.type,      k => typeConfig[k]?.color || "#6b7280", "filter-type", allTasks);
      renderAgg("agg-teams",    t => t.team,      k => teamConfig[k] || "#6b7280", "filter-team", allTasks);

      // releases agg
      const relContainer = document.getElementById("agg-releases");
      relContainer.innerHTML = "";
      filtered.filter(r => r.tasks.length > 0).forEach(r => {
        const color = projectConfig[r.project] || "#2563eb";
        const releaseKey = `${r.version}|${r.project}`;
        const isActive = document.getElementById("filter-release").value === releaseKey;
        const row = document.createElement("div");
        row.className = "agg-row" + (isActive ? " active" : "");
        row.innerHTML = `
          <span class="agg-label">
            <span class="agg-dot" style="background:${color}"></span>
            <span style="color:#9ca3af;font-size:0.75rem;margin-right:2px">${r.project}</span>${r.version}
          </span>
          <span class="agg-num">${r.tasks.length}</span>
        `;
        row.addEventListener("click", () => {
          const sel = document.getElementById("filter-release");
          sel.value = sel.value === releaseKey ? "" : releaseKey;
          applyFilters();
        });
        relContainer.appendChild(row);
      });
    }

    function renderReleases(filtered) {
      const container = document.getElementById("releases-container");
      const empty = document.getElementById("empty-state");
      container.innerHTML = "";

      let totalCount = 0;
      let anyVisible = false;

      filtered.forEach(release => {
        if (release.tasks.length === 0) return;
        anyVisible = true;
        totalCount += release.tasks.length;
        const projColor = projectConfig[release.project] || "#2563eb";

        const article = document.createElement("article");
        article.className = "release";

        const stack = projectStack[release.project] || "";
        const stackColor = stackConfig[stack] || "#6b7280";
        article.innerHTML = `
          <div class="release-header">
            <div class="release-meta">
              <span class="project-badge" style="background:${stackColor}18;color:${stackColor};border:1px solid ${stackColor}30">${stack}</span>
              <span class="project-badge" style="background:${projColor}18;color:${projColor};border:1px solid ${projColor}30">${release.project}</span>
              <span class="version">${release.version}</span>
              <span class="date">${release.date}</span>
            </div>
            <h2>${release.title}</h2>
            <span class="task-count">${release.tasks.length} задач</span>
          </div>
        `;

        const list = document.createElement("ul");
        list.className = "task-list";

        release.tasks.forEach(task => {
          const tc = typeConfig[task.type] || typeConfig.chore;
          const teamColor = teamConfig[task.team] || "#6b7280";
          const li = document.createElement("li");
          li.className = "task";
          li.innerHTML = `
            <span class="task-type" style="background:${tc.bg};color:${tc.color};border:1px solid ${tc.color}30">${tc.label}</span>
            <a class="task-id" href="https://issues.example.com/${task.id}" target="_blank">${task.id}</a>
            <span class="task-text">${task.text}</span>
            <span class="task-team" style="color:${teamColor}">${task.team}</span>
          `;
          list.appendChild(li);
        });

        article.appendChild(list);
        container.appendChild(article);
      });

      document.getElementById("stats-count").textContent = totalCount;

      // update subtitle
      const projectFilter = document.getElementById("filter-project").value;
      const total = releases.reduce((s, r) => s + r.tasks.length, 0);
      document.getElementById("header-subtitle").textContent =
        projectFilter
          ? `Проект: ${projectFilter} · ${totalCount} задач`
          : `${allProjects.length} проектов · ${totalCount} задач`;

      empty.style.display = anyVisible ? "none" : "block";
    }

    function getFiltered() {
      const search        = document.getElementById("search").value.toLowerCase();
      const stackFilter   = document.getElementById("filter-stack").value;
      const projectFilter = document.getElementById("filter-project").value;
      const releaseFilter = document.getElementById("filter-release").value;
      const teamFilter    = document.getElementById("filter-team").value;
      const typeFilter    = document.getElementById("filter-type").value;

      return releases.map(r => {
        if (stackFilter   && projectStack[r.project] !== stackFilter) return { ...r, tasks: [] };
        if (projectFilter && r.project !== projectFilter)             return { ...r, tasks: [] };
        const releaseKey = `${r.version}|${r.project}`;
        if (releaseFilter && releaseKey !== releaseFilter)            return { ...r, tasks: [] };
        const tasks = r.tasks
          .filter(t => {
            if (teamFilter && t.team !== teamFilter) return false;
            if (typeFilter && t.type !== typeFilter) return false;
            if (search && !t.text.toLowerCase().includes(search) && !t.id.toLowerCase().includes(search)) return false;
            return true;
          })
          .map(t => ({ ...t, _project: r.project }));
        return { ...r, tasks };
      });
    }

    function applyFilters() {
      const filtered = getFiltered();
      renderReleases(filtered);
      renderSidebar(filtered);
    }

    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("filter-stack").addEventListener("change", () => {
      const stack = document.getElementById("filter-stack").value;
      updateProjectSelect(stack);
      updateReleaseSelect(document.getElementById("filter-project").value, stack);
      applyFilters();
    });
    document.getElementById("filter-project").addEventListener("change", () => {
      const stack   = document.getElementById("filter-stack").value;
      const project = document.getElementById("filter-project").value;
      updateReleaseSelect(project, stack);
      applyFilters();
    });
    document.getElementById("filter-release").addEventListener("change", applyFilters);
    document.getElementById("filter-team").addEventListener("change", applyFilters);
    document.getElementById("filter-type").addEventListener("change", applyFilters);
    document.getElementById("reset-filters").addEventListener("click", () => {
      document.getElementById("search").value = "";
      document.getElementById("filter-stack").value = "";
      document.getElementById("filter-project").value = "";
      document.getElementById("filter-release").value = "";
      document.getElementById("filter-team").value = "";
      document.getElementById("filter-type").value = "";
      updateProjectSelect("");
      updateReleaseSelect("", "");
      applyFilters();
    });

    updateProjectSelect("");
    updateReleaseSelect("", "");
    applyFilters();
  </script>
</body>
</html>
