<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div>
        <h1>Release Notes</h1>
        <p class="subtitle">История изменений · 5 релизов</p>
      </div>
    </div>
  </header>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-card">
        <h3>Всего задач</h3>
        <div class="stat-total">
          <span class="big-num" id="total-count">0</span>
          <span class="big-label">задач в <span id="total-releases">0</span> релизах</span>
        </div>
      </div>

      <div class="sidebar-card">
        <h3>По типу</h3>
        <div id="agg-types"></div>
      </div>

      <div class="sidebar-card">
        <h3>По команде</h3>
        <div id="agg-teams"></div>
      </div>

      <div class="sidebar-card">
        <h3>По релизу</h3>
        <div id="agg-releases"></div>
      </div>

    </aside>

    <!-- Content -->
    <div class="content">

      <div class="toolbar">
        <input type="text" id="search" placeholder="Поиск по задачам, ID..." autocomplete="off">
        <div class="filters">
          <select id="filter-release">
            <option value="">Все релизы</option>
          </select>
          <select id="filter-team">
            <option value="">Все команды</option>
          </select>
          <select id="filter-type">
            <option value="">Все типы</option>
          </select>
          <button id="reset-filters">Сбросить</button>
        </div>
        <div class="stats-bar">Показано: <span id="stats-count">0</span> задач</div>
      </div>

      <div id="releases-container"></div>
      <div class="empty-state" id="empty-state" style="display:none">Ничего не найдено</div>

    </div>
  </div>

  <script>
    const releases = [
      {
        version: "v2.4.0",

        tasks: [
          { id: "PAY-101", type: "feat",     team: "Backend",  text: "Интеграция с платёжным шлюзом Stripe" },

          { id: "PAY-105", type: "feat",     team: "Mobile",   text: "Push-уведомления об успешной оплате" },
          { id: "PAY-106", type: "feat",     team: "Mobile",   text: "Apple Pay / Google Pay на экране оформления" },
          { id: "PAY-107", type: "fix",      team: "Backend",  text: "Дублирование платежей при повторном запросе" },
          { id: "PAY-108", type: "fix",      team: "Frontend", text: "Кнопка «Оплатить» не блокируется после клика" },
          { id: "PAY-109", type: "security", team: "Backend",  text: "Шифрование данных карты в transit (TLS 1.3)" },
          { id: "PAY-110", type: "security", team: "DevOps",   text: "Вынос секретов Stripe в Vault" },
          { id: "PAY-111", type: "perf",     team: "Backend",  text: "Кеширование курсов валют (Redis, TTL 5 мин)" },
          { id: "PAY-112", type: "chore",    team: "DevOps",   text: "Обновление sdk stripe до v12" },
          { id: "PAY-113", type: "feat",     team: "Design",   text: "Новые иллюстрации для статусов оплаты" },
          { id: "PAY-114", type: "fix",      team: "Mobile",   text: "Краш на iOS 16 при открытии чека" },
        ]
      },
      {
        version: "v2.3.1",
        date: "2026-03-18",
        title: "Хотфикс стабильности",
        tasks: [
          { id: "HOT-55", type: "fix",   team: "Backend",  text: "500 на эндпоинте /api/orders при пустом body" },
          { id: "HOT-56", type: "fix",   team: "Backend",  text: "Утечка соединений PostgreSQL при высокой нагрузке" },
          { id: "HOT-57", type: "fix",   team: "Frontend", text: "Белый экран при переходе на страницу профиля" },
          { id: "HOT-58", type: "fix",   team: "Mobile",   text: "Зависание приложения при потере сети" },

          { id: "HOT-60", type: "fix",   team: "Backend",  text: "Неверный расчёт скидки для купонов типа PERCENT" },
          { id: "HOT-61", type: "chore", team: "DevOps",   text: "Увеличение таймаута деплоя до 10 мин" },
        ]
      },
      {
        version: "v2.3.0",
        date: "2026-03-05",
        title: "Профили пользователей и аналитика",
        tasks: [
          { id: "USR-80", type: "feat",     team: "Backend",  text: "API профиля: аватар, bio, ссылки" },
          { id: "USR-81", type: "feat",     team: "Backend",  text: "Эндпоинт /me с агрегированной статистикой" },
          { id: "USR-82", type: "feat",     team: "Frontend", text: "Страница публичного профиля пользователя" },
          { id: "USR-83", type: "feat",     team: "Frontend", text: "Редактор профиля с crop-фото" },
          { id: "USR-84", type: "feat",     team: "Mobile",   text: "Экран профиля в мобильном приложении" },
          { id: "USR-85", type: "feat",     team: "Mobile",   text: "Виджет активности за последние 30 дней" },
          { id: "USR-86", type: "feat",     team: "Design",   text: "Дизайн-система: компонент Avatar (S/M/L/XL)" },
          { id: "USR-87", type: "feat",     team: "Design",   text: "Иконки бейджей и достижений" },
          { id: "USR-88", type: "perf",     team: "Backend",  text: "Индексы на user_id в таблицах events и sessions" },
          { id: "USR-89", type: "perf",     team: "Frontend", text: "Lazy-load аватаров в списках" },
          { id: "USR-90", type: "fix",      team: "Backend",  text: "Некорректная дата регистрации в UTC±0" },
          { id: "USR-91", type: "fix",      team: "Frontend", text: "Переполнение текста в длинных именах" },
          { id: "USR-92", type: "chore",    team: "DevOps",   text: "S3-бакет для хранения аватаров + CDN" },
          { id: "USR-93", type: "security", team: "Backend",  text: "Rate limiting на загрузку изображений (10/мин)" },
        ]
      },
      {
        version: "v2.2.0",
        date: "2026-02-12",
        title: "Поиск, фильтры и нотификации",
        tasks: [
          { id: "SRH-60", type: "feat",     team: "Backend",  text: "Полнотекстовый поиск через Elasticsearch" },
          { id: "SRH-61", type: "feat",     team: "Backend",  text: "Фасетные фильтры по категориям и тегам" },
          { id: "SRH-62", type: "feat",     team: "Frontend", text: "Компонент SearchBar с автодополнением" },
          { id: "SRH-63", type: "feat",     team: "Frontend", text: "Страница результатов поиска с пагинацией" },
          { id: "SRH-64", type: "feat",     team: "Mobile",   text: "Голосовой поиск на Android и iOS" },
          { id: "SRH-65", type: "feat",     team: "Backend",  text: "Сервис уведомлений: email + in-app" },
          { id: "SRH-66", type: "feat",     team: "Frontend", text: "Дропдаун уведомлений в шапке" },
          { id: "SRH-67", type: "feat",     team: "Mobile",   text: "Центр уведомлений в мобильном" },
          { id: "SRH-68", type: "perf",     team: "Backend",  text: "Асинхронная отправка email через очередь" },
          { id: "SRH-69", type: "perf",     team: "Backend",  text: "Кеш поисковых запросов (Redis, 2 мин)" },
          { id: "SRH-70", type: "fix",      team: "Frontend", text: "Дублирование результатов при быстром вводе" },
          { id: "SRH-71", type: "fix",      team: "Mobile",   text: "Пустой экран при отсутствии результатов" },
          { id: "SRH-72", type: "chore",    team: "DevOps",   text: "Деплой Elasticsearch 8.x кластера" },
          { id: "SRH-73", type: "chore",    team: "Design",   text: "Обновление иконок поиска и фильтра" },
          { id: "SRH-74", type: "security", team: "Backend",  text: "Санитизация поисковых запросов (NoSQL Injection)" },
        ]
      },
      {
        version: "v2.1.0",
        date: "2026-01-20",
        title: "Авторизация и онбординг",
        tasks: [
          { id: "AUTH-40", type: "feat",     team: "Backend",  text: "OAuth 2.0: Google и GitHub провайдеры" },
          { id: "AUTH-41", type: "feat",     team: "Backend",  text: "JWT refresh token rotation" },
          { id: "AUTH-42", type: "feat",     team: "Frontend", text: "Экран входа с соцсетями" },
          { id: "AUTH-43", type: "feat",     team: "Frontend", text: "Онбординг: 4-шаговый визард после регистрации" },
          { id: "AUTH-44", type: "feat",     team: "Mobile",   text: "Biometric auth (Face ID / Fingerprint)" },
          { id: "AUTH-45", type: "feat",     team: "Mobile",   text: "Экран онбординга со swipe-слайдами" },
          { id: "AUTH-46", type: "feat",     team: "Design",   text: "Иллюстрации для онбординга (5 шт)" },
          { id: "AUTH-47", type: "feat",     team: "Backend",  text: "2FA через TOTP (Google Authenticator)" },
          { id: "AUTH-48", type: "security", team: "Backend",  text: "Блокировка аккаунта после 5 неудачных входов" },
          { id: "AUTH-49", type: "security", team: "Backend",  text: "Хранение паролей bcrypt cost=12" },
          { id: "AUTH-50", type: "security", team: "DevOps",   text: "WAF правила против brute-force атак" },
          { id: "AUTH-51", type: "fix",      team: "Backend",  text: "Токен не инвалидируется при смене пароля" },
          { id: "AUTH-52", type: "fix",      team: "Frontend", text: "Форма регистрации не сбрасывается после ошибки" },
          { id: "AUTH-53", type: "perf",     team: "Backend",  text: "Сессионный кеш пользователя в Redis" },
          { id: "AUTH-54", type: "chore",    team: "DevOps",   text: "Настройка CORS для prod-домена" },
        ]
      }
    ];

    const typeConfig = {
      feat:     { color: "#16a34a", bg: "#f0fdf4", label: "feat" },
      fix:      { color: "#dc2626", bg: "#fef2f2", label: "fix" },
      perf:     { color: "#2563eb", bg: "#eff6ff", label: "perf" },
      chore:    { color: "#6b7280", bg: "#f9fafb", label: "chore" },
      security: { color: "#d97706", bg: "#fffbeb", label: "security" },
    };

    const teamConfig = {
      Frontend: "#7c3aed",
      Backend:  "#0369a1",
      Mobile:   "#0f766e",
      DevOps:   "#b45309",
      Design:   "#be185d",
    };

    // Populate selects
    const allVersions = releases.map(r => r.version);
    const allTeams = [...new Set(releases.flatMap(r => r.tasks.map(t => t.team)))].sort();
    const allTypes = [...new Set(releases.flatMap(r => r.tasks.map(t => t.type)))].sort();

    allVersions.forEach(v => {
      document.getElementById("filter-release").insertAdjacentHTML("beforeend", `<option value="${v}">${v}</option>`);
    });
    allTeams.forEach(t => {
      document.getElementById("filter-team").insertAdjacentHTML("beforeend", `<option value="${t}">${t}</option>`);
    });
    allTypes.forEach(t => {
      document.getElementById("filter-type").insertAdjacentHTML("beforeend", `<option value="${t}">${t}</option>`);
    });

    // Sidebar aggregation
    function renderSidebar(filtered) {
      const allTasks = filtered.flatMap(r => r.tasks);
      const total = allTasks.length;

      document.getElementById("total-count").textContent = total;
      document.getElementById("total-releases").textContent = filtered.filter(r => r.tasks.length > 0).length;

      function renderAgg(containerId, keys, colorFn, activeFilter, filterId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        const counts = {};
        allTasks.forEach(t => {
          const key = keys(t);
          counts[key] = (counts[key] || 0) + 1;
        });
        const max = Math.max(...Object.values(counts), 1);
        Object.entries(counts).sort((a, b) => b[1] - a[1]).forEach(([key, count]) => {
          const color = colorFn(key);
          const barWidth = Math.round((count / max) * 60);
          const isActive = document.getElementById(filterId).value === key;
          const row = document.createElement("div");
          row.className = "agg-row" + (isActive ? " active" : "");
          row.innerHTML = `
            <span class="agg-label">
              <span class="agg-dot" style="background:${color}"></span>
              ${key}
            </span>
            <span class="agg-bar-wrap">
              <span class="agg-bar" style="width:${barWidth}px;background:${color}20;border:1px solid ${color}40"></span>
              <span class="agg-num">${count}</span>
            </span>
          `;
          row.addEventListener("click", () => {
            const sel = document.getElementById(filterId);
            sel.value = sel.value === key ? "" : key;
            applyFilters();
          });
          container.appendChild(row);
        });
      }

      renderAgg("agg-types", t => t.type, k => typeConfig[k]?.color || "#6b7280", null, "filter-type");
      renderAgg("agg-teams", t => t.team, k => teamConfig[k] || "#6b7280", null, "filter-team");

      // releases agg
      const relContainer = document.getElementById("agg-releases");
      relContainer.innerHTML = "";
      filtered.forEach(r => {
        if (r.tasks.length === 0 && document.getElementById("filter-release").value !== r.version) return;
        const isActive = document.getElementById("filter-release").value === r.version;
        const row = document.createElement("div");
        row.className = "agg-row" + (isActive ? " active" : "");
        row.innerHTML = `
          <span class="agg-label">
            <span class="agg-dot" style="background:#2563eb"></span>
            ${r.version}
          </span>
          <span class="agg-num">${r.tasks.length}</span>
        `;
        row.addEventListener("click", () => {
          const sel = document.getElementById("filter-release");
          sel.value = sel.value === r.version ? "" : r.version;
          applyFilters();
        });
        relContainer.appendChild(row);
      });
    }

    function renderReleases(filtered) {
      const container = document.getElementById("releases-container");
      const empty = document.getElementById("empty-state");
      container.innerHTML = "";

      let totalCount = 0;
      let anyVisible = false;

      filtered.forEach(release => {
        if (release.tasks.length === 0) return;
        anyVisible = true;
        totalCount += release.tasks.length;

        const article = document.createElement("article");
        article.className = "release";

        article.innerHTML = `
          <div class="release-header">
            <div class="release-meta">
              <span class="version">${release.version}</span>
              <span class="date">${release.date}</span>
            </div>
            <h2>${release.title}</h2>
            <span class="task-count">${release.tasks.length} задач</span>
          </div>
        `;

        const list = document.createElement("ul");
        list.className = "task-list";

        release.tasks.forEach(task => {
          const tc = typeConfig[task.type] || typeConfig.chore;
          const teamColor = teamConfig[task.team] || "#6b7280";
          const li = document.createElement("li");
          li.className = "task";
          li.innerHTML = `
            <span class="task-type" style="background:${tc.bg};color:${tc.color};border:1px solid ${tc.color}30">${tc.label}</span>
            <a class="task-id" href="https://issues.example.com/${task.id}" target="_blank">${task.id}</a>
            <span class="task-text">${task.text}</span>
            <span class="task-team" style="color:${teamColor}">${task.team}</span>
          `;
          list.appendChild(li);
        });

        article.appendChild(list);
        container.appendChild(article);
      });

      document.getElementById("stats-count").textContent = totalCount;
      empty.style.display = anyVisible ? "none" : "block";
    }

    function getFiltered() {
      const search = document.getElementById("search").value.toLowerCase();
      const releaseFilter = document.getElementById("filter-release").value;
      const teamFilter = document.getElementById("filter-team").value;
      const typeFilter = document.getElementById("filter-type").value;

      return releases.map(r => {
        if (releaseFilter && r.version !== releaseFilter) return { ...r, tasks: [] };
        const tasks = r.tasks.filter(t => {
          if (teamFilter && t.team !== teamFilter) return false;
          if (typeFilter && t.type !== typeFilter) return false;
          if (search && !t.text.toLowerCase().includes(search) && !t.id.toLowerCase().includes(search)) return false;
          return true;
        });
        return { ...r, tasks };
      });
    }

    function applyFilters() {
      const filtered = getFiltered();
      renderReleases(filtered);
      renderSidebar(filtered);
    }

    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("filter-release").addEventListener("change", applyFilters);
    document.getElementById("filter-team").addEventListener("change", applyFilters);
    document.getElementById("filter-type").addEventListener("change", applyFilters);
    document.getElementById("reset-filters").addEventListener("click", () => {
      document.getElementById("search").value = "";
      document.getElementById("filter-release").value = "";
      document.getElementById("filter-team").value = "";
      document.getElementById("filter-type").value = "";
      applyFilters();
    });

    applyFilters();
  </script>
</body>
</html>
